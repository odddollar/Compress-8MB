<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress 8MB</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.jade.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Title header -->
    <article class="container center hero">
        <h1>Compress 8MB</h1>
        <p>Compress videos for upload-limited platforms</p>
    </article>

    <!-- Main body -->
    <article class="container setting-elements">
        <!-- Drag and drop file selection box -->
        <div>
            <label for="upload-box">Video File</label>
            <div id="upload-box" class="center upload-box">
                <i class="fa fa-video-camera"></i>
                Click to choose a video file, or drag one here
            </div>
        </div>

        <!-- Codec selection for compression -->
        <div>
            <label for="codec-grid">Video Codec</label>
            <div id="codec-grid" class="codec-grid center">
                <div class="codec-card active">
                    <strong>H.264</strong>
                    <small>Best compatibility</small>
                </div>
                <div class="codec-card">
                    <strong>H.265</strong>
                    <small>Improved image quality</small>
                </div>
                <div class="codec-card">
                    <strong>AV1</strong>
                    <small>Best image quality</small>
                </div>
            </div>
        </div>

        <!-- Target file size -->
        <div>
            <label for="target-size">Target File Size</label>
            <div class="target-size-group">
                <input id="target-size" class="target-size-input" type="number" min="1" max="500" step="1" value="8">
                <span>MB</span>
            </div>
        </div>

        <!-- Output frame rate -->
        <div>
            <label for="">Frame Rate</label>
            <div class="frame-rate-group">
                <select id="frame-rate" class="frame-rate-select">
                    <option selected>Same as source</option>
                    <option>24</option>
                    <option>30</option>
                    <option>60</option>
                </select>
                <span>FPS</span>
            </div>
        </div>

        <!-- Compress video -->
        <div>
            <button class="full-width">Compress Video</button>
        </div>
    </article>

    <!-- Footer -->
    <article class="container center">
        <small>All files processed client-side with no server uploads</small><br>
        <small>
            Made with ❤️. Source available on
            <a href="https://github.com">
                <i class="fa fa-github"></i> GitHub
            </a>
        </small>
    </article>

    <script src="main.js"></script>
</body>

</html>
